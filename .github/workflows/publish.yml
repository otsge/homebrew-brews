name: Publish and commit bottles

on:
  # workflow_dispatch:
  #   inputs:
  #     ref:
  #       required: true
  #     run-id:
  #       description: 'Workflow run-id'
  #       required: true
  #     pr:
  #       description: 'Pull Request Number'
  #       required: true
  #   workflows: [CI]
  #   types:
  #     - completed
  pull_request_target:
    types:
      - labeled

env:
  HOMEBREW_DEVELOPER: 1
  HOMEBREW_NO_ANALYTICS: 1
  HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
  HOMEBREW_SIMULATE_MACOS_ON_LINUX: 1
  BOTTLE_BRANCH: ${{ github.event.pull_request.head.ref }}
  BOTTLES_DIR: ${{ github.workspace }}/bottles
  # GH_REPO: ${{github.repository}}
  # GH_NO_UPDATE_NOTIFIER: 1
  # GH_PROMPT_DISABLED: 1

defaults:
  run:
    shell: bash -xeuo pipefail {0}

jobs:
  publish:
    if: contains(github.event.pull_request.labels.*.name, 'pr-pull')
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/homebrew/brew:main
    permissions:
      actions: read
      checks: read
      contents: write
      issues: read
      packages: write
      pull-requests: write
      attestations: write
      id-token: write
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          core: false
          cask: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - id: get-run-id
        env:
          GH_TOKEN: ${{ secrets.AUTOBUMP_TOKEN }}
        run: |
          runid=$(gh run list --branch "${BOTTLE_BRANCH}" --workflow tests.yml --limit 1 --json databaseId --jq '.[].databaseId')
          echo "run-id=${runid}" >> "${GITHUB_OUTPUT}"

      - name: Download bottles from GitHub Actions
        uses: actions/download-artifact@main
        with:
          pattern: bottles_*
          path: ${{ env.BOTTLES_DIR }}
          merge-multiple: true
          github-token: ${{ secrets.AUTOBUMP_TOKEN }}
          run-id: ${{ steps.get-run-id.outputs.run-id }}

      - name: Configure Git user
        id: git-user-config
        uses: Homebrew/actions/git-user-config@main
        with:
          username: ${{ github.repository_owner }}

      - name: Generate build provenance
        uses: actions/attest@main
        with:
          subject-path: ${{ env.BOTTLES_DIR }}/*.tar.gz

      - name: Pull bottles
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_GITHUB_PACKAGES_USER: ${{ github.repository_owner }}
          PULL_REQUEST: ${{ github.event.pull_request.number }}
        run: brew pr-pull --debug --verbose --tap="$GITHUB_REPOSITORY" "$PULL_REQUEST"

      # - name: Checkout branch for bottle commit
      #   env:
      #     BOTTLE_BRANCH: ${{ inputs.ref || github.event.pull_request.head.ref }}
      #   working-directory: ${{steps.set-up-homebrew.outputs.repository-path}}
      #   run: git checkout "${BOTTLE_BRANCH}"

      # - name: Upload bottles to GitHub Packages
      #   id: upload
      #   env:
      #     HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #     HOMEBREW_GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #     PULL_REQUEST: ${{ inputs.pr || github.event.pull_request.number }}
      #     HOMEBREW_GITHUB_PACKAGES_USER: BrewTestBot
      #     BREWTESTBOT_NAME_EMAIL: "BrewTestBot <1589480+BrewTestBot@users.noreply.github.com>"
      #     HOMEBREW_CORE_PATH: ${{steps.set-up-homebrew.outputs.repository-path}}
      #     BOTTLE_BRANCH: ${{ inputs.ref || github.event.pull_request.head.ref }}
      #   working-directory: ${{ env.BOTTLES_DIR }}
      #   run: |
      #     brew pr-upload --verbose --keep-old --committer="$BREWTESTBOT_NAME_EMAIL" --root-url="https://ghcr.io/v2/otsge/brews"
      #     echo "title=$(git -C "$HOMEBREW_CORE_PATH" log -1 --format='%s' "$BOTTLE_BRANCH")" >> "$GITHUB_OUTPUT"
      #     echo "head_sha=$(git -C "$HOMEBREW_CORE_PATH" rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Push commits
        uses: Homebrew/actions/git-try-push@main
        with:
          branch: main
        env:
          GIT_COMMITTER_NAME: BrewTestBot
          GIT_COMMITTER_EMAIL: 1589480+BrewTestBot@users.noreply.github.com

      - name: Delete branch
        if: github.event.pull_request.head.repo.fork == false
        run: git push --delete origin "${BOTTLE_BRANCH}"
